<!--
========================================================
Chat Interface Page
========================================================

Purpose:
--------
This page implements the user-chat interface for the RAG chatbot.

Features:
--------
- Real-time messaging UI
- Async communication with FastAPI backend
- User / bot message rendering
- Auto-scroll behavior
- Keyboard support (Enter to send)
========================================================
-->

{% extends "layout.html" %} {% block content %}

<div class="chat-container h-100 w-100">
  <!-- Messages -->
  <div id="chatMessages" class="chat-messages"></div>

  <!-- Input Area -->
  <div class="input-area mb-2 d-flex">
    <textarea
      id="inputMessage"
      class="form-control chat-input"
      placeholder="Ask anything..."
      autocomplete="off"
    ></textarea>

    <button id="sendBtn" class="send-button mx-2">
      <i class="fa-solid fa-paper-plane"></i>
    </button>
  </div>
</div>

{% endblock %} {% block scripts %}

<script>
  /*
========================================================
Chat Frontend Logic
========================================================
Handles:
- UI message rendering
- API communication with backend
- UX behavior (scroll, enter key, loading state)
========================================================
*/

  const inputMessage = document.getElementById("inputMessage");
  const sendBtn = document.getElementById("sendBtn");
  const chatMessages = document.getElementById("chatMessages");

  /* ================= MESSAGE RENDERING ================= */
  function appendMessage(text, sender) {
    const msgDiv = document.createElement("div");
    msgDiv.classList.add("message", sender);

    const bubble = document.createElement("span");
    bubble.classList.add("text-bubble", "px-3", "py-2");

    // Style based on sender
    if (sender === "user") {
      bubble.classList.add("bg-primary", "text-white");
    } else {
      bubble.classList.add("bg-body-secondary", "text-body");
    }

    bubble.innerHTML = text;

    // Bot avatar
    if (sender === "bot") {
      const logo = document.createElement("img");
      logo.src = "/static/icons/logo.jpg";
      logo.classList.add("bot-logo");
      msgDiv.appendChild(logo);
    }

    msgDiv.appendChild(bubble);
    chatMessages.appendChild(msgDiv);

    // Auto scroll
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  /* ================= SEND MESSAGE ================= */
  async function sendMessage() {
    const message = inputMessage.value.trim();
    if (!message) return;

    appendMessage(message, "user");

    inputMessage.value = "";
    sendBtn.disabled = true;

    try {
      const response = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ message }),
      });

      if (!response.ok) throw new Error("Network error");

      const data = await response.json();

      appendMessage(data.reply, "bot");
    } catch (err) {
      appendMessage("Error: server unreachable", "bot");
    } finally {
      sendBtn.disabled = false;
      inputMessage.focus();
    }
  }

  /* ================= EVENTS ================= */

  // Click send
  sendBtn.addEventListener("click", sendMessage);

  // Enter to send
  inputMessage.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
</script>

{% endblock %}
